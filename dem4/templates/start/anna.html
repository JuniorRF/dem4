<!DOCTYPE html> 
<html lang="ru">  
{% load static %}
<head>
  <meta property="og:site_name" content="Демчак — Анна">
  <meta property="og:url" content="https://демчак-резюме.рф/анна">
  <meta property="og:title" content="ДР">
  <meta property="og:description" content="Считаем возраст">
  <meta property="og:image" content="https://демчак-резюме.рф/static/images/fuck.jpg">
  <meta property="og:image:width" content="532">
  <meta property="og:image:height" content="726">
  <meta property="og:image:alt" content="Мой пиролжочек">
  <meta property="og:type" content="website">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="{% static 'img/fav/anna.ico' %}">
<title>Анютка</title>
<style>
    * {
        box-sizing: border-box;
        font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }
    .invisible {
        visibility: hidden;
    }
    .date-future {
        color: #d32f2f;
        text-align: center;
    }
    body {
        background: linear-gradient(145deg, #f0f4fa 0%, #e6ecf5 100%);
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    a {
        text-decoration: none;
        color: #fff;
        font-size: 30px;
        background: linear-gradient(90deg, #352f7a, #94064a);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        transition: transform 0.3s ease, filter 0.3s ease;
    }

    a:hover {
        transform: scale(1.1); /* Масштабирование */
        filter: drop-shadow(0 0 5px rgba(220, 247, 42, 5)); /* Свечение */
    }
    .links {
        display: flex;
        justify-content: center;
        gap: 30%;
    }
    .card {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 48px;
        padding: 2.5rem 2.2rem;
        box-shadow: 0 30px 50px rgba(0, 20, 40, 0.25), inset 2px 2px 5px rgba(255,255,255,0.6), inset -3px -3px 8px rgba(0,0,0,0.05);
        width: min(650px, 94%);
        border: 1px solid rgba(255,255,255,0.5);
        transition: all 0.2s ease;
    }
    h1 {
        font-size: 1.9rem;
        font-weight: 500;
        color: #1a2b3e;
        margin-top: 0;
        margin-bottom: 1.2rem;
        letter-spacing: -0.02em;
        border-left: 6px solid #3f6b9c;
        padding-left: 1.2rem;
        display: flex;
        justify-content: space-around;
    }
    .date-picker-block {
        background: #ffffffd6;
        border-radius: 100px;
        padding: 0.25rem 0.25rem 0.25rem 1.8rem;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.5rem;
        box-shadow: 0 6px 14px rgba(43, 68, 98, 0.1);
        margin-bottom: 2rem;
        border: 1px solid #ffffff;
    }
    .date-picker-block label {
        color: #2f4b70;
        font-weight: 600;
        font-size: 0.95rem;
        letter-spacing: 0.3px;
    }
    input[type="datetime-local"] {
        background: #f6faff;
        border: 1px solid #b9cfec;
        border-radius: 60px;
        padding: 0.85rem 1.2rem;
        font-size: 1.1rem;
        color: #102331;
        font-weight: 500;
        outline: none;
        flex: 1 1 240px;
        transition: 0.2s;
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
    }
    input[type="datetime-local"]:focus {
        border-color: #3f8ab3;
        box-shadow: 0 0 0 4px rgba(63, 139, 179, 0.2);
        background: #ffffff;
    }
    .time-diff-grid {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
    }
    .diff-row {
        background: #ffffffb3;
        border-radius: 60px;
        padding: 0.9rem 2rem 0.9rem 2.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 0.5rem 1.2rem;
        box-shadow: 0 6px 12px rgba(33, 53, 80, 0.08);
        backdrop-filter: blur(4px);
        border: 1px solid rgba(255,255,255,0.9);
        transition: 0.15s;
    }
    .diff-row:hover {
        background: #ffffffea;
        border-color: #c3d9fc;
    }
    .unit {
        font-size: 1.3rem;
        font-weight: 600;
        color: #1e3d5e;
        display: flex;
        align-items: center;
        gap: 0.3rem;
    }
    .unit span {
        font-size: 0.85rem;
        font-weight: 400;
        color: #4f658d;
        margin-left: 8px;
        background: #eef3fc;
        padding: 0.2rem 0.9rem;
        border-radius: 30px;
        white-space: nowrap;
    }
    .value {
        font-size: 2.4rem;
        font-weight: 700;
        letter-spacing: 1px;
        background: linear-gradient(135deg, #213b55, #183244);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-fill-color: transparent;
        min-width: 130px;
        text-align: right;
        font-variant-numeric: tabular-nums;
    }
    .meta-note {
        text-align: center;
        margin-top: 2rem;
        font-size: 0.95rem;
        color: #4e6580;
        background: #dbe5f0c9;
        border-radius: 40px;
        padding: 0.9rem;
        border: 1px dashed #8ea9c9;
    }
    .badge {
        background: #3f6b9c20;
        padding: 0.25rem 1rem;
        border-radius: 40px;
        color: #1d3f62;
        font-weight: 500;
        margin-left: 0.5rem;
        font-size: 0.85rem;
    }
    .section-title {
        font-size: 1rem;
        font-weight: 600;
        color: #2f4b70;
        margin: 0.5rem 0 0.2rem 1.5rem;
        letter-spacing: 0.5px;
    }
    hr {
        border: none;
        height: 2px;
        background: linear-gradient(90deg, transparent, #9bb7d4, transparent);
        margin: 1.5rem 0 1rem 0;
    }
    footer {
        font-size: 0.85rem;
        color: #566f8f;
        margin-top: 1.2rem;
        text-align: center;
    }
</style>
</head>
<body>
    
<div class="card">
<div class="links">
    <a class="" href="{% url 'start:index' %}">главная</a>
    <a class="" href="{% url 'posts:homepage' %}">бложик</a>
</div>
<h1>🎂  ДР</h1>

<!-- поле даты/времени -->
<div class="date-picker-block">
    <label for="targetDate">📅  День рождения</label>
    <input type="datetime-local" id="targetDate" value="2025-09-18T12:00">
</div>

<div class="date-future">
    <h3>ТЫ ЕБАНАШКА? ИЗ БУДУЩЕГО?</h3>
</div>

<!-- КОЛИЧЕСТВО ЛЕТ (полных) -->
<div class="time-diff-grid" id="diffContainer">
    <div class="diff-row" style="background: #e1e9f5e0;">
        <span class="unit">Полных лет <span>возраст</span></span>
        <span class="value" id="years">—</span>
    </div>



<!-- суммарные дни, часы, минуты, секунды -->

    <div class="diff-row">
        <span class="unit">Дней <span>всего</span></span>
        <span class="value" id="days">—</span>
    </div>
    <div class="diff-row">
        <span class="unit">Часов <span>всего</span></span>
        <span class="value" id="hours">—</span>
    </div>
    <div class="diff-row">
        <span class="unit">Минут <span>всего</span></span>
        <span class="value" id="minutes">—</span>
    </div>
    <div class="diff-row">
        <span class="unit">Секунд <span>всего</span></span>
        <span class="value" id="seconds">—</span>
    </div>
</div>

<div class="meta-note">
    ⏱️  <strong id="currentMomentLabel">1 января 1990, 12:00</strong> 
    <span class="badge" id="futureBadge"></span>
</div>
<footer>⚡ изменяйте дату — годы и суммарные величины обновляются</footer>
</div>

<script>
(function() {
    // Элементы
    const futureError = document.querySelector('.date-future');
    const diffContainerEl = document.getElementById('diffContainer');
    const yearsEl = document.getElementById('years');
    const daysEl = document.getElementById('days');
    const hoursEl = document.getElementById('hours');
    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');
    const currentMomentLabel = document.getElementById('currentMomentLabel');
    const futureBadge = document.getElementById('futureBadge');

    const targetInput = document.getElementById('targetDate');

    // Форматирование даты для подписи
    function formatDateLabel(date) {
        if (!date || isNaN(date.getTime())) return '?';
        const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
        return date.toLocaleDateString('ru-RU', options);
    }

    // РАСЧЁТ ПОЛНЫХ ЛЕТ (с учётом дня и месяца)
    function calculateFullYears(birthDate, now) {
        let years = now.getFullYear() - birthDate.getFullYear();
        // Проверяем, был ли уже день рождения в этом году
        const currentBirthday = new Date(now.getFullYear(), birthDate.getMonth(), birthDate.getDate(), 
                                         birthDate.getHours(), birthDate.getMinutes(), birthDate.getSeconds());
        if (now < currentBirthday) {
            years--;
        }
        return years;
    }

    function updateDiff() {
        const inputValue = targetInput.value;
        if (!inputValue)  {
            setDefaultPlaceholders();
            currentMomentLabel.innerText = 'дата не указана';
            futureBadge.innerText = '';
            return;
        }

        const targetDate = new Date(inputValue + ':00'); // добавляем секунды
        if (isNaN(targetDate.getTime())) {
            setDefaultPlaceholders();
            currentMomentLabel.innerText = 'некорректная дата';
            futureBadge.innerText = '';
            return;
        }

        const now = new Date();

        let fullYears = 0;
        if (targetDate <= now) {
            fullYears = calculateFullYears(targetDate, now);
        } else {
            fullYears = 0;
        }

        const diffMs = Math.abs(now - targetDate);
        const totalSeconds = Math.floor(diffMs / 1000);
        const totalMinutes = Math.floor(totalSeconds / 60);
        const totalHours = Math.floor(totalMinutes / 60);
        const totalDays = Math.floor(totalHours / 24);

        yearsEl.innerText = fullYears.toLocaleString('ru-RU');
        daysEl.innerText = totalDays.toLocaleString('ru-RU');
        hoursEl.innerText = totalHours.toLocaleString('ru-RU');
        minutesEl.innerText = totalMinutes.toLocaleString('ru-RU');
        secondsEl.innerText = totalSeconds.toLocaleString('ru-RU');

        // Обновляем подпись
        const targetLabel = formatDateLabel(targetDate);
        if (targetDate > now) {
            currentMomentLabel.innerText = targetLabel + ' (буд.)';
            futureBadge.innerText = '⚠️ дата в будущем';
            setDefaultPlaceholders();
            futureError.classList.remove('invisible');
            
        } else {
            currentMomentLabel.innerText = targetLabel;
            futureBadge.innerText = '';
            futureError.classList.add('invisible');
        }
    }

    function setDefaultPlaceholders() {
        yearsEl.innerText = '—';
        daysEl.innerText = '—';
        hoursEl.innerText = '—';
        minutesEl.innerText = '—';
        secondsEl.innerText = '—';
    }

    targetInput.addEventListener('change', updateDiff);
    targetInput.addEventListener('input', updateDiff);

    updateDiff();

    setInterval(updateDiff, 1000);
})();
</script>
</body>
</html>
